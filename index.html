<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Quest Pipeline Test</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0c447c">
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #111;
    overflow: hidden;
    font-family: -apple-system, sans-serif;
  }
  #info {
    position: absolute;
    top: 16px;
    left: 0;
    width: 100%;
    text-align: center;
    color: #ddd;
    font-size: 14px;
    z-index: 10;
    pointer-events: none;
  }
  #cube-container {
    width: 100%;
    height: 100%;
  }
</style>
</head>
<body>
  <div id="info">Drag to rotate</div>
  <div id="cube-container"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    const container = document.getElementById('cube-container');
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.z = 3;

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    container.appendChild(renderer.domElement);

    const geometry = new THREE.BoxGeometry(1.2, 1.2, 1.2);
    const colors = [0x378ADD, 0x1D9E75, 0xD85A30, 0xD4537E, 0x7F77DD, 0xBA7517];
    const materials = colors.map(c => new THREE.MeshStandardMaterial({ color: c }));
    const cube = new THREE.Mesh(geometry, materials);
    scene.add(cube);

    const light1 = new THREE.DirectionalLight(0xffffff, 1.2);
    light1.position.set(2, 2, 3);
    scene.add(light1);
    scene.add(new THREE.AmbientLight(0xffffff, 0.5));

    let dragging = false, lastX = 0, lastY = 0;
    let rotY = 0.3, rotX = 0.3;

    function pointerDown(x, y) { dragging = true; lastX = x; lastY = y; }
    function pointerMove(x, y) {
      if (!dragging) return;
      rotY += (x - lastX) * 0.01;
      rotX += (y - lastY) * 0.01;
      lastX = x; lastY = y;
    }
    function pointerUp() { dragging = false; }

    renderer.domElement.addEventListener('mousedown', e => pointerDown(e.clientX, e.clientY));
    window.addEventListener('mousemove', e => pointerMove(e.clientX, e.clientY));
    window.addEventListener('mouseup', pointerUp);
    renderer.domElement.addEventListener('touchstart', e => { const t = e.touches[0]; pointerDown(t.clientX, t.clientY); });
    renderer.domElement.addEventListener('touchmove', e => { const t = e.touches[0]; pointerMove(t.clientX, t.clientY); e.preventDefault(); }, { passive: false });
    renderer.domElement.addEventListener('touchend', pointerUp);

    function animate() {
      requestAnimationFrame(animate);
      if (!dragging) rotY += 0.003;
      cube.rotation.x = rotX;
      cube.rotation.y = rotY;
      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
