<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Quest Pipeline Test</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0c447c">
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #111;
    overflow: hidden;
    font-family: -apple-system, sans-serif;
  }
  #info {
    position: absolute;
    top: 16px;
    left: 0;
    width: 100%;
    text-align: center;
    color: #ddd;
    font-size: 14px;
    z-index: 10;
    pointer-events: none;
  }
  #cube-container {
    width: 100%;
    height: 100%;
  }
  #vr-button {
    position: absolute;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    padding: 12px 24px;
    font-size: 15px;
    background: #0c447c;
    color: white;
    border: none;
    border-radius: 8px;
    z-index: 10;
    cursor: pointer;
  }
  #vr-button:disabled {
    background: #444;
    color: #888;
  }
</style>
</head>
<body>
  <div id="info">Drag to rotate. In VR: hold trigger to grab. Right thumbstick: spin (left/right), push/pull (up/down).</div>
  <div id="cube-container"></div>
  <button id="vr-button" disabled>Checking VR support...</button>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    const container = document.getElementById('cube-container');
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 1.6, 3);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.xr.enabled = true;
    container.appendChild(renderer.domElement);

    const geometry = new THREE.BoxGeometry(0.5, 0.5, 0.5);
    const colors = [0x378ADD, 0x1D9E75, 0xD85A30, 0xD4537E, 0x7F77DD, 0xBA7517];
    const materials = colors.map(c => new THREE.MeshStandardMaterial({ color: c }));
    const cube = new THREE.Mesh(geometry, materials);
    cube.position.set(0, 1.4, -1.5);
    scene.add(cube);

    const highlightColor = 0xffffff;
    let originalColors = colors.slice();

    function setCubeColor(hex) {
      cube.material.forEach(m => m.color.setHex(hex));
    }

    const floorGeo = new THREE.PlaneGeometry(6, 6);
    const floorMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI / 2;
    scene.add(floor);

    const light1 = new THREE.DirectionalLight(0xffffff, 1.2);
    light1.position.set(2, 3, 3);
    scene.add(light1);
    scene.add(new THREE.AmbientLight(0xffffff, 0.6));

    let dragging = false, lastX = 0, lastY = 0;
    let rotY = 0.3, rotX = 0.3;

    function pointerDown(x, y) { dragging = true; lastX = x; lastY = y; }
    function pointerMove(x, y) {
      if (!dragging) return;
      rotY += (x - lastX) * 0.01;
      rotX += (y - lastY) * 0.01;
      lastX = x; lastY = y;
    }
    function pointerUp() { dragging = false; }

    renderer.domElement.addEventListener('mousedown', e => pointerDown(e.clientX, e.clientY));
    window.addEventListener('mousemove', e => pointerMove(e.clientX, e.clientY));
    window.addEventListener('mouseup', pointerUp);
    renderer.domElement.addEventListener('touchstart', e => { const t = e.touches[0]; pointerDown(t.clientX, t.clientY); });
    renderer.domElement.addEventListener('touchmove', e => { const t = e.touches[0]; pointerMove(t.clientX, t.clientY); e.preventDefault(); }, { passive: false });
    renderer.domElement.addEventListener('touchend', pointerUp);

    function buildController(index) {
      const controller = renderer.xr.getController(index);
      scene.add(controller);

      const rayGeo = new THREE.BufferGeometry().setFromPoints([
        new THREE.Vector3(0, 0, 0),
        new THREE.Vector3(0, 0, -1)
      ]);
      const rayMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.6 });
      const ray = new THREE.Line(rayGeo, rayMat);
      ray.scale.z = 5;
      ray.name = 'ray';
      controller.add(ray);

      controller.addEventListener('selectstart', onTriggerDown);
      controller.addEventListener('selectend', onTriggerUp);
      return controller;
    }

    const controller0 = buildController(0);
    const controller1 = buildController(1);
    const raycaster = new THREE.Raycaster();
    const tempMatrix = new THREE.Matrix4();

    let grabbingController = null;
    let currentGrabDistance = 0.5;
    let cubeSpin = 0;

    function getControllerRay(controller) {
      tempMatrix.identity().extractRotation(controller.matrixWorld);
      const origin = new THREE.Vector3().setFromMatrixPosition(controller.matrixWorld);
      const direction = new THREE.Vector3(0, 0, -1).applyMatrix4(tempMatrix);
      return { origin, direction };
    }

    function onTriggerDown(event) {
      const controller = event.target;
      const { origin, direction } = getControllerRay(controller);
      raycaster.ray.origin.copy(origin);
      raycaster.ray.direction.copy(direction);

      const hits = raycaster.intersectObject(cube);
      if (hits.length > 0) {
        grabbingController = controller;
        currentGrabDistance = 0.5;
        setCubeColor(highlightColor);
      }
    }

    function onTriggerUp(event) {
      if (grabbingController) {
        grabbingController = null;
        cube.material.forEach((m, i) => m.color.setHex(originalColors[i]));
      }
    }

    renderer.setAnimationLoop(() => {
      if (!renderer.xr.isPresenting) {
        if (!dragging) rotY += 0.003;
        cube.rotation.x = rotX;
        cube.rotation.y = rotY;
      } else if (grabbingController) {
        const session = renderer.xr.getSession();
        let axisX = 0, axisY = 0;
        if (session) {
          for (const source of session.inputSources) {
            if (source.handedness === 'right' && source.gamepad) {
              const axes = source.gamepad.axes;
              axisX = axes[2] || axes[0] || 0;
              axisY = axes[3] || axes[1] || 0;
              break;
            }
          }
        }

        const deadzone = 0.15;
        if (Math.abs(axisX) > deadzone) {
          cubeSpin += axisX * 0.04;
        }
        if (Math.abs(axisY) > deadzone) {
          currentGrabDistance -= axisY * 0.03;
          currentGrabDistance = Math.max(0.2, Math.min(3, currentGrabDistance));
        }

        const { origin, direction } = getControllerRay(grabbingController);
        cube.position.copy(origin).addScaledVector(direction, currentGrabDistance);
        cube.rotation.y = cubeSpin;
      } else {
        cube.rotation.y += 0.005;
      }
      renderer.render(scene, camera);
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    const vrButton = document.getElementById('vr-button');
    let xrSession = null;

    function onSessionEnded() {
      xrSession = null;
      vrButton.textContent = 'Enter VR';
    }

    async function onVRButtonClick() {
      if (xrSession) {
        xrSession.end();
        return;
      }
      try {
        const session = await navigator.xr.requestSession('immersive-vr', {
          optionalFeatures: ['local-floor', 'bounded-floor']
        });
        xrSession = session;
        session.addEventListener('end', onSessionEnded);
        await renderer.xr.setSession(session);
        vrButton.textContent = 'Exit VR';
      } catch (err) {
        vrButton.textContent = 'VR failed: ' + err.message;
      }
    }

    if (navigator.xr) {
      navigator.xr.isSessionSupported('immersive-vr').then(supported => {
        if (supported) {
          vrButton.disabled = false;
          vrButton.textContent = 'Enter VR';
          vrButton.addEventListener('click', onVRButtonClick);
        } else {
          vrButton.textContent = 'VR not supported on this browser';
        }
      });
    } else {
      vrButton.textContent = 'WebXR not available';
    }

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
